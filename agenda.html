<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basis Northwest 2026 · Preliminary Agenda</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bark:      #16090A;
      --cedar:     #3D1F10;
      --pine:      #1B2E1A;
      --moss:      #2E4823;
      --fern:      #4A6637;
      --fog:       #5A4E42;
      --parchment: #EAE0CB;
      --warm:      #F5EDD8;
      --tan:       #C49A5A;
      --tan-light: #B8A870;
      --tan-rule:  #A08840;
      --text:      #0D0604;
      --muted:     #3A2A1A;
    }

    @page { size: legal portrait; margin: 0; }

    html, body {
      width: 8.5in;
      margin: 0 auto;
      background: white;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    /* ── LAYOUT ───────────────────────────────────────── */
    #root { display: block; padding: 0.5in 0.45in; }
    .section { position: relative; }
    .section::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; background: var(--tan-light);
    }
    .section--nobot::after { display: none; }
    .section--cols { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .col { padding: 8px 0; }
    .col--eve { display: flex; flex-direction: column; }

    /* ── HEADER ───────────────────────────────────────── */
    .hdr {
      background: var(--bark);
      padding: 10px 12px 9px;
      display: grid; grid-template-columns: 1fr auto; align-items: center;
    }
    .hdr-name    { font-family: 'Newsreader', serif; font-size: 26px; font-weight: 700; color: var(--warm); line-height: 1; }
    .hdr-sub     { font-size: 7px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--tan); margin-top: 4px; }
    .hdr-meta    { text-align: right; }
    .hdr-dates   { font-size: 7.5px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.85); margin-top: 2px; }
    .hdr-hosts   { font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 3px; }

    /* ── RULE ─────────────────────────────────────────── */
    .rule { height: 3px; background: linear-gradient(90deg, var(--moss) 0%, var(--fern) 45%, var(--tan) 100%); }

    /* ── WEDNESDAY STRIP ─────────────────────────────── */
    .wed-wrap { padding: 8px 0; }

    /* ── DAY HEADING ──────────────────────────────────── */
    .day-head  { padding-bottom: 5px; border-bottom: 2px solid var(--pine); }
    .day-label { font-family: 'Newsreader', serif; font-size: 15px; font-weight: 700; color: var(--pine); }
    .day-date  { font-size: 7px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

    /* ── THIN STRIPS ──────────────────────────────────── */
    .strip {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0; margin-bottom: 6px;
      border-top: 1px solid var(--tan-rule); border-bottom: 1px solid var(--tan-rule);
      background: rgba(245,237,216,0.5);
    }
    .strip-label { font-size: 6.5px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--moss); }
    .lunch {
      background: rgba(245,237,216,0.5);
      display: flex; align-items: center; justify-content: space-between;
      margin: 0; padding: 8px 0;
      border-top: 1px solid var(--tan-rule); border-bottom: 1px solid var(--tan-rule);
    }
    .lunch-label { font-size: 6.5px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--moss); }
    .lunch-time  { font-size: 7px; font-weight: 500; color: var(--muted); }

    /* ── SESSION LIST ─────────────────────────────────── */
    .session-list { display: flex; flex-direction: column; gap: 5px; }

    /* ── SESSIONS (no boxes — left accent + text stack) ── */
    .session {
      padding: 2px 0 2px 8px;
      border-left: 2px solid var(--cedar);
      display: flex; flex-direction: column; gap: 1px;
    }
    .session--canvas { border-left-color: var(--moss); }
    .session-company         { font-size: 6px; font-weight: 600; color: var(--muted); letter-spacing: 0.04em; }
    .session-company--canvas { color: var(--moss); }
    .session-title           { font-size: 7.5px; font-weight: 600; color: var(--text); line-height: 1.2; }
    .session-title--tbd      { color: var(--muted); font-style: italic; }
    .session-host            { font-size: 6.5px; font-weight: 600; color: var(--cedar); }
    .session-speakers        { font-size: 6.5px; color: var(--muted); }
    .session-speakers--tbd   { color: var(--muted); font-style: italic; }

    /* ── BREAKOUT ─────────────────────────────────────── */
    .bk { position: relative; margin-top: 8px; }
    .bk::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--tan-light); }
.bk-days { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .bk-half { padding: 8px 0; }
    .bk-rooms     { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: start; }
    .bk-room      { display: flex; flex-direction: column; gap: 4px; }
    .bk-room-lbl  { font-size: 6px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fog); margin-bottom: 1px; }

    /* ── EVENING ──────────────────────────────────────── */
    .eve-stack { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .eve-block {
      background: var(--cedar);
      padding: 9px 12px; flex: 1;
      display: flex; flex-direction: column; justify-content: center;
    }
    .eve-label { font-size: 6.5px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--tan); margin-bottom: 4px; }
    .eve-title { font-family: 'Newsreader', serif; font-size: 13px; font-weight: 700; color: var(--warm); line-height: 1.25; }
    .eve-sub   { font-size: 7.5px; color: rgba(255,255,255,0.6); margin-top: 3px; }

    /* ── FOOTER ───────────────────────────────────────── */
    .footer {
      background: var(--bark); padding: 6px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-left  { font-size: 7.5px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .footer-left strong { color: var(--tan); font-weight: 600; }
    .footer-right { font-family: 'Newsreader', serif; font-size: 9px; color: rgba(255,255,255,0.65); }

    /* ── EXPORT ───────────────────────────────────────── */
    .export-bar { width: 8.5in; margin: 0 auto; padding: 12px 0; display: flex; justify-content: flex-end; }
    .export-btn { background: var(--pine); color: var(--warm); border: none; border-radius: 4px; padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
    .export-btn:hover    { background: var(--moss); }
    .export-btn:disabled { opacity: 0.5; cursor: wait; }
    @media print { .export-bar { display: none; } }
  </style>
</head>
<body>
<div id="root"></div>
<script>

const STAMP    = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
const DAY_ORIGIN = 420;

const DAY_META = {
  thu: { label: 'Day One', date: 'Thursday · May 28, 2026' },
  fri: { label: 'Day Two', date: 'Friday · May 29, 2026' },
};

const EVENING = {
  thu: [{ label: 'Evening · Thursday, May 28, 2026', title: 'Evening Soiree', sub: 'Hosted by First Trust · Bell Harbor · Seattle, Washington' }],
  fri: [{ label: 'Evening · Friday, May 29, 2026', title: 'Mariners vs. Diamondbacks', sub: 'Hosted by Basis Northwest · T-Mobile Park · Seattle, Washington' }],
};

function slotToTime(n) {
  const m  = DAY_ORIGIN + n * 5;
  const h  = Math.floor(m / 60), min = m % 60;
  const ap = h >= 12 ? 'PM' : 'AM';
  const dh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return `${dh}:${min.toString().padStart(2, '0')} ${ap}`;
}

// ── data ──────────────────────────────────────────────────

function buildDays(state) {
  const CONTENT = new Set(['keynote', 'solo', 'panel', 'open']);
  const UTIL = /^(doors|registration|breakfast|lunch|expo|happy hour|thursday|load|mariners|dinner|thanks for coming)/i;

  const cmap = Object.fromEntries(state.contacts.map(c => [c.id, c]));
  function nameOf(id) {
    const c = cmap[id];
    if (!c) return '';
    const full = `${c.firstName || ''} ${c.lastName || ''}`.trim();
    return full || c.name || '';
  }

  function sessionFrom(slot) {
    const speakers = slot.assignments
      .filter(a => a.slotRole !== 'Moderator')
      .map(a => nameOf(a.contactId)).filter(Boolean).join(' · ') || null;
    const mod = slot.assignments.find(a => a.slotRole === 'Moderator');
    return {
      startSlot:   slot.startSlot,
      company:     slot.company || '',
      title:       slot.title || null,
      placeholder: slot.isTbd || !slot.title || slot.type === 'open' || slot.title === 'To Be Announced',
      speakers,
      host:   mod ? nameOf(mod.contactId) : null,
      canvas: slot.isSponsored && (slot.company || '').includes('Canvas'),
      pinned: !!slot.pinned,
    };
  }

  return state.days.filter(d => d.id !== 'wed').map(day => {
    const meta  = DAY_META[day.id] || { label: day.label, date: day.date };
    const slots = state.slots.filter(s => s.dayId === day.id).sort((a, b) => a.startSlot - b.startSlot);

    const breakfast  = slots.find(s => /breakfast/i.test(s.title || '') && s.type === 'event');
    const lunch      = slots.find(s => /lunch/i.test(s.title || '') && s.type === 'event');
    const lunchStart = lunch?.startSlot ?? 54;
    const lunchEnd   = lunchStart + (lunch?.durationSlots ?? 18);

    const llaSlots = slots.filter(s => s.venueId === 'll-a' && CONTENT.has(s.type));
    const llbSlots = slots.filter(s => s.venueId === 'll-b' && CONTENT.has(s.type));
    const bStarts  = [...new Set([...llaSlots, ...llbSlots].map(s => s.startSlot))].sort((a, b) => a - b);
    const firstBStart = bStarts[0] ?? lunchStart + 12;
    const lastBSlot = [...llaSlots, ...llbSlots].reduce((best, s) => s.startSlot > (best?.startSlot ?? -1) ? s : best, null);

    const speakerSalon = slots.find(s => /speaker salon/i.test(s.title || '') && s.venueId === 'main-stage');
    const breakfastBand = breakfast
      ? { label: 'Breakfast + Expo', startSlot: breakfast.startSlot, endSlot: breakfast.startSlot + breakfast.durationSlots }
      : speakerSalon
      ? { label: 'Breakfast + Speaker Salon', startSlot: speakerSalon.startSlot, endSlot: speakerSalon.startSlot + speakerSalon.durationSlots }
      : null;

    const morning = slots.filter(s =>
      s.venueId === 'main-stage' && s.startSlot < lunchStart &&
      (CONTENT.has(s.type) || (s.type === 'event' && s.company && !UTIL.test(s.title || ''))) &&
      !/speaker salon/i.test(s.title || '') &&
      !(s.isTbd && !s.title)
    );

    const afternoon = slots.filter(s =>
      s.venueId === 'main-stage' && s.startSlot >= lunchEnd && s.type !== 'break' &&
      (CONTENT.has(s.type) || (s.type === 'event' && !UTIL.test(s.title || '') && s.startSlot < 150)) &&
      !(s.isTbd && !s.title)
    );

    return {
      ...meta,
      id: day.id,
      breakfastBand,
      lunchRange:    `${slotToTime(lunchStart)} – ${slotToTime(firstBStart)}`,
      breakoutRange: bStarts.length && lastBSlot
        ? `${slotToTime(bStarts[0])} – ${slotToTime(lastBSlot.startSlot + lastBSlot.durationSlots)}`
        : '',
      morning:   morning.map(sessionFrom),
      breakouts: bStarts.map(ss => ({
        lla: llaSlots.find(s => s.startSlot === ss) ? sessionFrom(llaSlots.find(s => s.startSlot === ss)) : null,
        llb: llbSlots.find(s => s.startSlot === ss) ? sessionFrom(llbSlots.find(s => s.startSlot === ss)) : null,
      })),
      afternoon: afternoon.map(sessionFrom),
      evening:   EVENING[day.id] || [],
    };
  });
}

// ── session builder ───────────────────────────────────────
// No boxes. Left accent stripe + text stack.

function buildSession(parent, session) {
  if (!session) return null;

  const isTbd = session.placeholder || !session.title;

  let cls = 'session';
  if (!isTbd && session.canvas) cls += ' session--canvas';

  const el = parent.append('div').attr('class', cls);

  const title   = isTbd ? 'Title to-be-announced' : session.title;
  const compCls = 'session-company' + (session.canvas ? ' session-company--canvas' : '');

  if (session.company) el.append('div').attr('class', compCls).text(session.company);
  el.append('div').attr('class', 'session-title' + (isTbd ? ' session-title--tbd' : '')).text(title);
  if (session.host)    el.append('div').attr('class', 'session-host').text('Host: ' + session.host);
  if (session.speakers) el.append('div').attr('class', 'session-speakers').text(session.speakers);
  else if (isTbd)       el.append('div').attr('class', 'session-speakers session-speakers--tbd').text('Speaker to-be-announced');

  return el;
}

// ── renderer ──────────────────────────────────────────────

function renderAgenda(DAYS) {
  const page = d3.select('#root');

  // Header
  const hdr = page.append('div').attr('class', 'hdr');
  const hl  = hdr.append('div');
  hl.append('div').attr('class', 'hdr-name').text('Basis Northwest 2026');
  hl.append('div').attr('class', 'hdr-sub').text('Taxable Wealth Innovation Conference');
  const hm = hdr.append('div').attr('class', 'hdr-meta');
  hm.append('div').attr('class', 'hdr-dates').text('May 28 to 29, 2026 · Seattle, Washington');
  hm.append('div').attr('class', 'hdr-hosts').text('Hosted by Brent Sullivan · Shang Chou');

  // Rule
  page.append('div').attr('class', 'rule');

  // Wednesday pre-conf
  const wed    = page.append('div').attr('class', 'section');
  const wedWrap = wed.append('div').attr('class', 'wed-wrap');
  const wedBlk  = wedWrap.append('div').attr('class', 'eve-block');
  wedBlk.append('div').attr('class', 'eve-label').text('Pre-Conference · Wednesday, May 27, 2026');
  wedBlk.append('div').attr('class', 'eve-title').text('Welcome Reception');
  wedBlk.append('div').attr('class', 'eve-sub').text('Hosted by Canvas (Franklin Templeton) · Aerlume, Seattle');

  // Day headings
  const dayRow = page.append('div').attr('class', 'section section--cols');
  DAYS.forEach(day => {
    const col = dayRow.append('div').attr('class', 'col');
    const dh  = col.append('div').attr('class', 'day-head');
    dh.append('div').attr('class', 'day-label').text(day.label);
    dh.append('div').attr('class', 'day-date').text(day.date);
  });

  // Breakfast strips
  const bfRow = page.append('div').attr('class', 'section section--cols');
  DAYS.forEach(day => {
    const col = bfRow.append('div').attr('class', 'col');
    if (day.breakfastBand) {
      const s = col.append('div').attr('class', 'strip');
      s.append('div').attr('class', 'strip-label').text(day.breakfastBand.label);
    }
  });

  // First Half
  const fhLabel = page.append('div').attr('class', 'lunch');
  fhLabel.append('div').attr('class', 'lunch-label').text('First Half · Main Stage');
  fhLabel.append('div').attr('class', 'lunch-time').text('8:30 – 11:30 AM');

  const morningRow = page.append('div').attr('class', 'section section--cols');
  DAYS.forEach(day => {
    const col  = morningRow.append('div').attr('class', 'col');
    const list = col.append('div').attr('class', 'session-list');
    day.morning.forEach(s => buildSession(list, s));
  });

  // Lunch
  const lunchEl = page.append('div').attr('class', 'lunch');
  lunchEl.append('div').attr('class', 'lunch-label').text('Lunch + Expo');
  lunchEl.append('div').attr('class', 'lunch-time').text('11:30 AM – 12:30 PM');

  // Breakout
  const bk = page.append('div').attr('class', 'bk');
  const bkHdr = bk.append('div').attr('class', 'lunch');
  bkHdr.append('div').attr('class', 'lunch-label').text('Breakout Sessions');
  bkHdr.append('div').attr('class', 'lunch-time').text('12:30 – 1:30 PM');
  const bkDays = bk.append('div').attr('class', 'bk-days');
  DAYS.forEach(day => {
    const half  = bkDays.append('div').attr('class', 'bk-half');
    const rooms = half.append('div').attr('class', 'bk-rooms');
    const roomA = rooms.append('div').attr('class', 'bk-room');
    roomA.append('div').attr('class', 'bk-room-lbl').text('Breakout A');
    const roomB = rooms.append('div').attr('class', 'bk-room');
    roomB.append('div').attr('class', 'bk-room-lbl').text('Breakout B');
    day.breakouts.forEach(slot => {
      buildSession(roomA, slot.lla);
      buildSession(roomB, slot.llb);
    });
  });

  // Second Half
  const shLabel = page.append('div').attr('class', 'lunch');
  shLabel.append('div').attr('class', 'lunch-label').text('Second Half · Main Stage');
  shLabel.append('div').attr('class', 'lunch-time').text('1:30 – 4:55 PM');

  const afternoonRow = page.append('div').attr('class', 'section section--cols');
  DAYS.forEach(day => {
    const col  = afternoonRow.append('div').attr('class', 'col');
    const list = col.append('div').attr('class', 'session-list');
    day.afternoon.forEach(s => buildSession(list, s));
  });

  // Evening
  const eveningRow = page.append('div').attr('class', 'section section--cols section--nobot');
  DAYS.forEach(day => {
    const col   = eveningRow.append('div').attr('class', 'col col--eve');
    const stack = col.append('div').attr('class', 'eve-stack');
    day.evening.forEach(ev => {
      const blk = stack.append('div').attr('class', 'eve-block');
      blk.append('div').attr('class', 'eve-label').text(ev.label);
      blk.append('div').attr('class', 'eve-title').text(ev.title);
      blk.append('div').attr('class', 'eve-sub').text(ev.sub);
    });
  });

  // Footer
  const foot = page.append('div').attr('class', 'footer');
  foot.append('div').attr('class', 'footer-left')
    .html(`Presented by <strong>Canvas</strong> &nbsp;·&nbsp; Preliminary · Subject to Change &nbsp;·&nbsp; ${STAMP}`);
  foot.append('div').attr('class', 'footer-right').text('www.basisconf.com');
}

// ── export ────────────────────────────────────────────────

const exportBar = d3.select('body').append('div').attr('class', 'export-bar');
const exportBtn = exportBar.append('button').attr('class', 'export-btn').text('Export Image');
exportBtn.on('click', async function () {
  exportBtn.attr('disabled', true).text('Rendering...');
  const canvas = await html2canvas(document.getElementById('root'), {
    scale: 4, useCORS: true, allowTaint: true,
    backgroundColor: '#F5F0E8', logging: false,
  });
  const link = document.createElement('a');
  link.download = `basis-northwest-2026-agenda-${new Date().toISOString().slice(0, 10)}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
  exportBtn.attr('disabled', null).text('Export Image');
});
