<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basis Northwest 2026 · Preliminary Agenda</title>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bark:      #16090A;
      --cedar:     #3D1F10;
      --pine:      #1B2E1A;
      --moss:      #2E4823;
      --fern:      #4A6637;
      --fog:       #5A4E42;
      --parchment: #EAE0CB;
      --warm:      #F5EDD8;
      --tan:       #C49A5A;
      --tan-light: #B8A870;
      --tan-rule:  #A08840;
      --text:      #0D0604;
      --muted:     #3A2A1A;
    }

    @page { size: legal portrait; margin: 0; }

    html, body {
      width: 8.5in;
      margin: 0 auto;
      background: white;
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text);
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    #root { display: block; padding: 0.5in 0.45in; }

    .hdr {
      background: var(--bark); padding: 10px 12px 9px;
      display: grid; grid-template-columns: 1fr auto; align-items: center;
    }
    .hdr-name  { font-family: 'Newsreader', serif; font-size: 26px; font-weight: 700; color: var(--warm); line-height: 1; }
    .hdr-sub   { font-size: 7px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; color: var(--tan); margin-top: 4px; }
    .hdr-meta  { text-align: right; }
    .hdr-dates  { font-size: 7.5px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.85); margin-top: 2px; }
    .hdr-hosts  { font-size: 7px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin-top: 3px; }
    .hdr-venue  { font-size: 6px; letter-spacing: 0.10em; text-transform: uppercase; color: rgba(255,255,255,0.92); margin-top: 5px; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 4px; }
    .hdr-addr   { font-size: 5.5px; letter-spacing: 0.08em; color: rgba(255,255,255,0.75); margin-top: 2px; }

    .rule { height: 3px; background: linear-gradient(90deg, var(--moss) 0%, var(--fern) 45%, var(--tan) 100%); }

    .wed-block { background: var(--cedar); padding: 7px 12px; margin: 8px 0 10px; }

    .days-row { display: grid; grid-template-columns: 1fr 1fr; gap: 54px; }
    .day-col  { display: flex; flex-direction: column; }

    .day-head  { padding-bottom: 5px; border-bottom: 2px solid var(--pine); margin-bottom: 5px; }
    .day-label { font-family: 'Newsreader', serif; font-size: 15px; font-weight: 700; color: var(--pine); }
    .day-date  { font-size: 7px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 3px; }

    .legend       { display: flex; gap: 14px; margin: 8px 0 10px; justify-content: center; }
    .legend-item  { display: flex; align-items: center; gap: 3px; font-size: 5.5px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
    .legend-swatch        { width: 8px; height: 8px; flex-shrink: 0; border-left: 2px solid; }
    .legend-swatch--main  { background: #DFC070; border-color: var(--cedar); }
    .legend-swatch--lla   { background: #7DB876; border-color: var(--moss);  }
    .legend-swatch--llb   { background: #6EA2D8; border-color: #2E52A8;      }

    .day-grid { position: relative; overflow: visible; }
    .sb-area  { position: absolute; left: 0; top: 0; right: 0; bottom: 0; z-index: 1; }

    .time-tick { position: absolute; left: 0; right: 0; border-top: 1px solid rgba(160,136,64,0.18); pointer-events: none; }
    .time-tick-label {
      position: absolute; top: -6px; left: calc(100% + 4px);
      font-size: 5px; font-weight: 500; color: var(--muted);
      letter-spacing: 0.06em; white-space: nowrap; line-height: 1;
    }

    .sb {
      position: absolute; overflow: hidden;
      padding: 2px 3px 2px 5px;
      display: flex; flex-direction: column; gap: 0.5px;
    }
    .sb--main { background: #DFC070; border-left: 3px solid var(--cedar); }
    .sb--lla  { background: #7DB876; border-left: 3px solid var(--moss);  }
    .sb--llb  { background: #6EA2D8; border-left: 3px solid #2E52A8;      }
    .sb--util { background: rgba(234,224,203,0.45); border-left: 2px solid rgba(160,136,64,0.45); }
    .sb--break     { background: #D0D0C8; border-left: 2px solid #989890; }
    .sb-break-lbl  { font-size: 6px; font-weight: 600; color: rgba(80,80,80,0.65); text-transform: uppercase; }

    .sb-company  { font-size: 5px;   font-weight: 700; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-title    { font-size: 6.5px; font-weight: 600; color: var(--text);  line-height: 1.2;
                   display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; }
    .sb-title--tbd { font-style: italic; color: var(--fog); }
    .sb-host     { font-size: 5.5px; font-weight: 600; color: var(--cedar); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sb-speakers { font-size: 5.5px; color: var(--muted); overflow: hidden; }
    .sb-speakers--tbd { font-style: italic; }
    .sb-tiny     { font-size: 5.5px; font-weight: 600; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1; padding-top: 2px; }
    .sb--compact { padding: 1px 3px 0 4px !important; gap: 0 !important; }
    .sb--compact .sb-tiny { padding-top: 0; color: var(--text); }
    .sb-emcee-intro { position: absolute; top: 2px; right: 3px; font-size: 4.5px; font-weight: 700; color: rgba(0,0,0,0.38); line-height: 1; pointer-events: none; }
    .sb-emcee-outro { position: absolute; bottom: 2px; right: 3px; font-size: 4.5px; font-weight: 700; color: rgba(0,0,0,0.38); line-height: 1; pointer-events: none; }

    .eve-block {
      background: var(--cedar); padding: 9px 12px; margin-top: 8px;
    }
    .eve-label { font-size: 6.5px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--tan); margin-bottom: 4px; }
    .eve-title { font-family: 'Newsreader', serif; font-size: 13px; font-weight: 700; color: var(--warm); line-height: 1.25; }
    .eve-sub   { font-size: 7.5px; color: rgba(255,255,255,0.6); margin-top: 3px; }

    .footer {
      background: var(--bark); padding: 6px 12px; margin-top: 12px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-left  { font-size: 7.5px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
    .footer-left strong { color: var(--tan); font-weight: 600; }
    .footer-right { font-family: 'Newsreader', serif; font-size: 9px; color: rgba(255,255,255,0.65); }

    .export-bar { width: 8.5in; margin: 0 auto; padding: 12px 0; display: flex; justify-content: flex-end; }
    .export-btn { background: var(--pine); color: var(--warm); border: none; border-radius: 4px; padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
    .export-btn:hover    { background: var(--moss); }
    .export-btn:disabled { opacity: 0.5; cursor: wait; }
    @media print { .export-bar { display: none; } }

    #root { display: block; padding: 0.5in 0.45in; }
    .section { position: relative; }
    .section::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;

    .col { padding: 8px 0; }
    .col--eve { display: flex; flex-direction: column; }

    /* ── HEADER ───────────────────────────────────────── */
    .hdr {
      background: var(--bark);
      padding: 10px 12px 9px;
      display: grid; grid-template-columns: 1fr auto; align-items: center;
    }
    .hdr-name    { font-family: 'Newsreader', serif; font-size: 26px; font-weight: 700; color: var(--warm); line-height: 1; }

    .rule { height: 3px; background: linear-gradient(90deg, var(--moss) 0%, var(--fern) 45%, var(--tan) 100%); }

    .wed-wrap { padding: 8px 0; }

    .day-head  { padding-bottom: 5px; border-bottom: 2px solid var(--pine); }

    /* ── THIN STRIPS ──────────────────────────────────── */
    .strip {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 0; margin-bottom: 6px;

    .lunch {

    .lunch-time  { font-size: 7px; font-weight: 500; color: var(--muted); }

    /* ── SESSION LIST ─────────────────────────────────── */
    .session-list { display: flex; flex-direction: column; gap: 5px; }

    /* ── SESSIONS (no boxes — left accent + text stack) ── */
    .session {

    }

    .session-company--canvas { color: var(--moss); }
    .session-title           { font-size: 7.5px; font-weight: 600; color: var(--text); line-height: 1.2; }

    .session-host            { font-size: 6.5px; font-weight: 600; color: var(--cedar); }
    .session-speakers        { font-size: 6.5px; color: var(--muted); }
    .session-speakers--tbd   { color: var(--muted); font-style: italic; }

    /* ── BREAKOUT ─────────────────────────────────────── */
    .bk { position: relative; margin-top: 8px; }
    .bk::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: var(--tan-light); }
.bk-days { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .bk-half { padding: 8px 0; }
    .bk-rooms     { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-items: start; }
    .bk-room      { display: flex; flex-direction: column; gap: 4px; }
    .bk-room-lbl  { font-size: 6px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fog); margin-bottom: 1px; }

    /* ── EVENING ──────────────────────────────────────── */
    .eve-stack { display: flex; flex-direction: column; gap: 5px; flex: 1; }
    .eve-block {
      background: var(--cedar);
      padding: 9px 12px; flex: 1;
      display: flex; flex-direction: column; justify-content: center;
    }
    .eve-label { font-size: 6.5px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--tan); margin-bottom: 4px; }
    .eve-title { font-family: 'Newsreader', serif; font-size: 13px; font-weight: 700; color: var(--warm); line-height: 1.25; }
    .eve-sub   { font-size: 7.5px; color: rgba(255,255,255,0.6); margin-top: 3px; }

    /* ── FOOTER ───────────────────────────────────────── */
    .footer {
      background: var(--bark); padding: 6px 12px;
      display: flex; align-items: center; justify-content: space-between;
    }

    .footer-left strong { color: var(--tan); font-weight: 600; }

    /* ── EXPORT ───────────────────────────────────────── */
    .export-bar { width: 8.5in; margin: 0 auto; padding: 12px 0; display: flex; justify-content: flex-end; }
    .export-btn { background: var(--pine); color: var(--warm); border: none; border-radius: 4px; padding: 8px 18px; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: background 0.15s; }
    .export-btn:hover    { background: var(--moss); }
    .export-btn:disabled { opacity: 0.5; cursor: wait; }

<body>
<div id="root"></div>
<script>

const STAMP      = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
const DAY_ORIGIN = 420;
const PX_PER_MIN = 1.8;

// Emcee assignments: intro letter + outro letter
// B=Brent  S=Shang  D=Dave Nadig  H=Generic host
// Thu AM: Brent  Thu PM: Shang  Fri AM: Brent  Fri PM: Shang
const EMCEE = {
  'thu-main-opening-remarks':               'BB',
  'thu-main-keynote1':                      'HB', // Chris Loveless intros Ehren
  'thu-main-arnott':                        'BB',
  'thu-main-ryan':                          'BB',
  'thu-main-jeff':                          'BB',
  'thu-main-open1':                         'DD', // Dave moderates
  'thu-main-alex':                          'BS', // Brent intros, Shang takes PM
  'thu-main-bunn':                          'BB',
  'thu-main-aqr':                           'SS',
  'thu-main-aqr-fort':                      'SS',
  'thu-main-nuveen':                        'SS',
  'thu-main-alliance':                      'SB', // Shang intro, Brent closes day
  'thu-main-ft-closer':                     'BB',
  'fri-main-panel8':                        'BB', // Brent moderating AMA
  'fri-main-savina':                        'BB',
  'fri-main-open1':                         'BB', // SyntheticFi
  'fri-main-firsttrust':                    'BB',
  'fri-main-vise':                          'BB',
  'fri-main-practitioner':                  'SS',
  'fri-main-paul-ms':                       'SS',
  'fri-main-beer':                          'BB',
  'ab3e3540-59e3-4372-a3a2-94bb88965074':   'BB', // Family Office
  'fri-main-meb':                           'DD', // Dave moderates Meb interview
  'fri-main-closing':                       'SB', // Shang intro, Brent closes
};
const GRID_START = 0;    // slot 0 = 7:00 AM
const GRID_END   = 120;  // slot 120 = 5:00 PM

const DAY_META = {
  thu: { label: 'Day One', date: 'Thursday · May 28, 2026' },
  fri: { label: 'Day Two', date: 'Friday · May 29, 2026'   },
};
const EVENING = {
  thu: [
    { label: 'Evening · Thursday, May 28 · 5:00–7:00 PM', title: 'Thursday Evening Soiree', sub: 'Hosted by First Trust · Bell Harbor · Seattle, Washington' },
  ],
  fri: [
    { label: 'Evening · Friday, May 29 · 5:00–6:00 PM', title: 'Going Away Party',        sub: 'Basis Northwest 2026 · Farewell Reception' },
    { label: 'Evening · Friday, May 29 · 7:10 PM',       title: 'Mariners vs. Diamondbacks', sub: 'Hosted by Basis Northwest · T-Mobile Park · Seattle, Washington' },
  ],
};
const VENUE_ORDER = { 'main-stage': 0, 'll-a': 1, 'll-b': 2 };

function slotToMin(slot) { return DAY_ORIGIN + slot * 5; }
function slotToY(slot)   { return (slotToMin(slot) - slotToMin(GRID_START)) * PX_PER_MIN; }
function slotsToH(dur)   { return dur * 5 * PX_PER_MIN; }

function venueClass(v) {
  return v === 'll-a' ? 'sb--lla' : v === 'll-b' ? 'sb--llb' : 'sb--main';
}

function isBg(s) {
  return s.type === 'break' || (s.type === 'event' && /doors|lunch/i.test(s.title || ''));
}

function assignCols(slots) {
  return slots.map(s => {
    if (isBg(s)) return { ...s, col: 0, totalCols: 1 };
    const concurrent = slots
      .filter(o => !isBg(o))
      .filter(o => o.startSlot < s.startSlot + s.durationSlots &&
                   o.startSlot + o.durationSlots > s.startSlot)
      .sort((a, b) => (VENUE_ORDER[a.venueId] ?? 3) - (VENUE_ORDER[b.venueId] ?? 3) ||
                       a.startSlot - b.startSlot);
    return { ...s, col: concurrent.indexOf(s), totalCols: concurrent.length };
  });
}

function renderAgenda(state) {
  const cmap = Object.fromEntries(state.contacts.map(c => [c.id, c]));
  function nameOf(id) {
    const c = cmap[id]; if (!c) return '';
    return (`${c.firstName || ''} ${c.lastName || ''}`).trim() || c.name || '';
  }

  const GRID_HEIGHT = (GRID_END - GRID_START) * 5 * PX_PER_MIN;
  const page = d3.select('#root');

  const hdr = page.append('div').attr('class', 'hdr');
  const hl  = hdr.append('div');
  hl.append('div').attr('class', 'hdr-name').text('Basis Northwest 2026');
  hl.append('div').attr('class', 'hdr-sub').text('Taxable Wealth Innovation Conference');
  const hm = hdr.append('div').attr('class', 'hdr-meta');
  hm.append('div').attr('class', 'hdr-dates').text('May 28 to 29, 2026 · Seattle, Washington');
  hm.append('div').attr('class', 'hdr-hosts').text('Hosted by Brent Sullivan · Shang Chou');
  hm.append('div').attr('class', 'hdr-venue').text('Bell Harbor International Conference Center');
  hm.append('div').attr('class', 'hdr-addr').text('2211 Alaskan Way, Pier 66 · Seattle, WA 98121');
  page.append('div').attr('class', 'rule');

  const wb = page.append('div').attr('class', 'wed-block');
  wb.append('div').attr('class', 'eve-label').text('Pre-Conference · Wednesday, May 27, 2026');
  wb.append('div').attr('class', 'eve-title').text('Welcome Reception');
  wb.append('div').attr('class', 'eve-sub').text('Hosted by Canvas (Franklin Templeton) · Aerlume, Seattle');

  const leg = page.append('div').attr('class', 'legend');
  [['main','Main Stage'],['lla','Marina'],['llb','Cove']].forEach(([k, lbl]) => {
    const li = leg.append('div').attr('class', 'legend-item');
    li.append('div').attr('class', `legend-swatch legend-swatch--${k}`);
    li.append('span').text(lbl);
  });

  const daysRow = page.append('div').attr('class', 'days-row');

  const startMin = slotToMin(GRID_START);
  const tickBase = Math.ceil(startMin / 30) * 30;

  state.days.filter(d => d.id !== 'wed').forEach(day => {
    const meta  = DAY_META[day.id] || { label: day.label, date: day.date };
    const slots = state.slots
      .filter(s => s.dayId === day.id && s.startSlot >= GRID_START && s.startSlot < GRID_END)
      .filter(s => s.type !== 'load-in')
      .filter(s => !/mariners|thursday happy|nuveen.*dinner|going away/i.test(s.title || ''));

    const laid = assignCols(slots);
    const col  = daysRow.append('div').attr('class', 'day-col');

    const dh = col.append('div').attr('class', 'day-head');
    dh.append('div').attr('class', 'day-label').text(meta.label);
    dh.append('div').attr('class', 'day-date').text(meta.date);

    const grid   = col.append('div').attr('class', 'day-grid').style('height', GRID_HEIGHT + 'px');
    const sbArea = grid.append('div').attr('class', 'sb-area');

    const showLabels = day.id === 'thu';
    for (let m = tickBase; m <= slotToMin(GRID_END); m += 30) {
      const y    = (m - startMin) * PX_PER_MIN;
      const tick = grid.append('div').attr('class', 'time-tick').style('top', y + 'px');
      if (showLabels) {
        const h  = Math.floor(m / 60), mn = m % 60;
        const dh2 = h > 12 ? h - 12 : h === 0 ? 12 : h;
        const lbl = `${dh2}:${mn.toString().padStart(2,'0')} ${h >= 12 ? 'PM' : 'AM'}`;
        tick.append('span').attr('class', 'time-tick-label').text(lbl);
      }
    }

    laid.forEach(s => {
      const top    = slotToY(s.startSlot);
      const height = slotsToH(s.durationSlots);
      const isTbd  = s.isTbd || !s.title || s.title === 'To Be Announced';
      const isBreak = s.type === 'break';
      const isUtil  = s.type === 'event' && /doors|registration|breakfast|lunch/i.test(s.title || '');

      let cls = 'sb ';
      if (isBreak)       cls += 'sb--break';
      else if (isUtil)   cls += 'sb--util';
      else               cls += venueClass(s.venueId);

      const block = sbArea.append('div').attr('class', cls)
        .style('top',     top + 'px')
        .style('height',  Math.max(height - 1, 2) + 'px')
        .style('left',    (s.col / s.totalCols * 100) + '%')
        .style('width',   (1 / s.totalCols * 100) + '%')
        .style('z-index', (isBreak || isUtil) ? '0' : '1');
      if (s.color) block.style('background', s.color).style('border-left-color', s.color);
      const emceeTag = EMCEE[s.id];
      if (emceeTag) {
        block.append('div').attr('class', 'sb-emcee-intro').text(emceeTag[0]);
        block.append('div').attr('class', 'sb-emcee-outro').text(emceeTag[1]);
      }

      if (isBreak) {
        if (height >= 10) block.append('div').attr('class', 'sb-break-lbl').text('Break');
        return;
      }
      if (isBg(s)) {
        if (height >= 50) block.append('div').attr('class', 'sb-title').text(s.title || '');
        return;
      }
      if (height < 8) {
        block.append('div').attr('class', 'sb-tiny').text(s.title || '');
        return;
      }
      if (height < 16) {
        block.classed('sb--compact', true);
        block.append('div').attr('class', 'sb-tiny').text(isTbd ? 'To Be Announced' : (s.title || ''));
        return;
      }

      const speakers = s.assignments
        .filter(a => a.slotRole !== 'Moderator')
        .map(a => nameOf(a.contactId)).filter(Boolean).join(' · ');
      const modAsgn = s.assignments.find(a => a.slotRole === 'Moderator');
      const host = modAsgn ? nameOf(modAsgn.contactId) : null;

      if (s.company && height > 14) block.append('div').attr('class', 'sb-company').text(s.company);
      block.append('div').attr('class', 'sb-title' + (isTbd ? ' sb-title--tbd' : '')).text(isTbd ? 'To Be Announced' : s.title);
      if (height > 18) {
        if (host)            block.append('div').attr('class', 'sb-host').text('Host: ' + host);
        if (speakers)        block.append('div').attr('class', 'sb-speakers').text(speakers);
        else if (isTbd && s.company) block.append('div').attr('class', 'sb-speakers sb-speakers--tbd').text('Speaker to-be-announced');
      }
    });

    const evs = EVENING[day.id];
    if (evs) {
      evs.forEach(ev => {
        const evBlk = col.append('div').attr('class', 'eve-block');
        evBlk.append('div').attr('class', 'eve-label').text(ev.label);
        evBlk.append('div').attr('class', 'eve-title').text(ev.title);
        evBlk.append('div').attr('class', 'eve-sub').text(ev.sub);
      });
    }
  });

  const foot = page.append('div').attr('class', 'footer');
  foot.append('div').attr('class', 'footer-left')
    .html(`Presented by <strong>Canvas</strong> &nbsp;·&nbsp; Preliminary · Subject to Change &nbsp;·&nbsp; ${STAMP}`);
  foot.append('div').attr('class', 'footer-right').text('www.basisconf.com');
}
